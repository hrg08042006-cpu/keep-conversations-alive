name: Keep Conversations Alive

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          pip install PyGithub
      
      - name: Run keep-alive bot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: hrg08042006-cpu
          REPO_NAME: keep-conversations-alive
          INACTIVITY_DAYS: 25
        run: python scripts/keep_alive_bot.py
